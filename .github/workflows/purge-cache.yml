name: Purge jsDelivr Cache

on:
  push:
    paths:
      - 'galaxy-smart-recommender.json'
      - 'galaxy-smart-recommender-hack.json'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr Cache
        uses: egad13/purge-jsdelivr-cache@v1
        with:
          url: "https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/galaxy-smart-recommender.json\nhttps://cdn.jsdelivr.net/gh/${{ github.repository }}@main/galaxy-smart-recommender-hack.json\nhttps://cdn.jsdelivr.net/gh/${{ github.repository }}@latest/galaxy-smart-recommender.json\nhttps://cdn.jsdelivr.net/gh/${{ github.repository }}@latest/galaxy-smart-recommender-hack.json"
